name: Build and Release

on:
  push:
    branches: [main, master]
    tags: ['v*']
  pull_request:
    branches: [main, master]

env:
  CARGO_TERM_COLOR: always

jobs:
  # 运行测试和检查
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}

      - name: Run tests
        run: cargo test --verbose

      - name: Check formatting
        run: cargo fmt -- --check

      - name: Run clippy
        run: cargo clippy -- -D warnings

  # 构建 Linux x86_64 版本
  build-linux:
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-unknown-linux-gnu

      - name: Cache cargo dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}

      - name: Build release
        run: cargo build --release --verbose

      - name: Get version
        id: get_version
        run: |
          VERSION=$(cat VERSION)
          echo "VERSION=$VERSION" >> $GITHUB_OUTPUT
          echo "version=$VERSION" >> $GITHUB_OUTPUT

      - name: Package binary
        run: |
          mkdir -p dist
          cp target/release/asp-lite dist/
          cp -r www dist/ 2>/dev/null || mkdir -p dist/www
          cp .env.example dist/
          cp README.md dist/
          cp VERSION dist/
          cd dist
          tar czf "asp-lite-linux-x64-v${{ steps.get_version.outputs.version }}.tar.gz" asp-lite www .env.example README.md VERSION

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: asp-lite-linux-x64
          path: dist/*.tar.gz

  # 构建 Linux musl 版本（静态链接）
  build-linux-musl:
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-unknown-linux-musl

      - name: Install musl tools
        run: sudo apt-get update && sudo apt-get install -y musl-tools

      - name: Cache cargo dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-musl-cargo-${{ hashFiles('**/Cargo.lock') }}

      - name: Build release (musl)
        run: cargo build --release --target x86_64-unknown-linux-musl --verbose

      - name: Get version
        id: get_version
        run: |
          VERSION=$(cat VERSION)
          echo "VERSION=$VERSION" >> $GITHUB_OUTPUT
          echo "version=$VERSION" >> $GITHUB_OUTPUT

      - name: Package binary
        run: |
          mkdir -p dist
          cp target/x86_64-unknown-linux-musl/release/asp-lite dist/
          cp -r www dist/ 2>/dev/null || mkdir -p dist/www
          cp .env.example dist/
          cp README.md dist/
          cp VERSION dist/
          cd dist
          tar czf "asp-lite-linux-musl-x64-v${{ steps.get_version.outputs.version }}.tar.gz" asp-lite www .env.example README.md VERSION

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: asp-lite-linux-musl-x64
          path: dist/*.tar.gz

  # 构建 Windows 版本
  build-windows:
    runs-on: windows-latest
    needs: test
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-pc-windows-msvc

      - name: Cache cargo dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}

      - name: Build release
        run: cargo build --release --verbose

      - name: Get version
        id: get_version
        shell: bash
        run: |
          VERSION=$(cat VERSION)
          echo "VERSION=$VERSION" >> $GITHUB_OUTPUT
          echo "version=$VERSION" >> $GITHUB_OUTPUT

      - name: Package binary
        shell: bash
        run: |
          mkdir -p dist
          cp target/release/asp-lite.exe dist/
          cp -r www dist/ 2>/dev/null || mkdir -p dist/www
          cp .env.example dist/
          cp README.md dist/
          cp VERSION dist/
          cd dist
          7z a "asp-lite-windows-x64-v${{ steps.get_version.outputs.version }}.zip" asp-lite.exe www .env.example README.md VERSION

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: asp-lite-windows-x64
          path: dist/*.zip

  # 构建 macOS 版本
  build-macos:
    runs-on: macos-latest
    needs: test
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}

      - name: Build release
        run: cargo build --release --verbose

      - name: Get version
        id: get_version
        run: |
          VERSION=$(cat VERSION)
          echo "VERSION=$VERSION" >> $GITHUB_OUTPUT
          echo "version=$VERSION" >> $GITHUB_OUTPUT

      - name: Package binary
        run: |
          mkdir -p dist
          cp target/release/asp-lite dist/
          cp -r www dist/ 2>/dev/null || mkdir -p dist/www
          cp .env.example dist/
          cp README.md dist/
          cp VERSION dist/
          cd dist
          tar czf "asp-lite-macos-x64-v${{ steps.get_version.outputs.version }}.tar.gz" asp-lite www .env.example README.md VERSION

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: asp-lite-macos-x64
          path: dist/*.tar.gz

  # 创建 Release（仅在推送 tag 时执行）
  release:
    runs-on: ubuntu-latest
    needs: [build-linux, build-linux-musl, build-windows, build-macos]
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Get version
        id: get_version
        run: |
          VERSION=$(cat VERSION)
          echo "VERSION=$VERSION" >> $GITHUB_OUTPUT

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          name: "asp-lite v${{ steps.get_version.outputs.VERSION }}"
          files: |
            artifacts/asp-lite-linux-x64/*.tar.gz
            artifacts/asp-lite-linux-musl-x64/*.tar.gz
            artifacts/asp-lite-windows-x64/*.zip
            artifacts/asp-lite-macos-x64/*.tar.gz
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

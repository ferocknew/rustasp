name: Build and Release

on:
  push:
    tags: ['v*']

env:
  CARGO_TERM_COLOR: always

jobs:
  # 运行测试和检查
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}

      - name: Run tests
        run: cargo test --verbose

      - name: Check formatting
        run: cargo fmt -- --check

      - name: Run clippy
        run: cargo clippy

  # 构建 Linux x86_64 版本
  build-linux:
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-unknown-linux-gnu

      - name: Cache cargo dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}

      - name: Build release
        run: cargo build --release --verbose

      - name: Get version
        id: get_version
        run: |
          VERSION=$(cat VERSION)
          echo "VERSION=$VERSION" >> $GITHUB_OUTPUT
          echo "version=$VERSION" >> $GITHUB_OUTPUT

      - name: Package binary
        run: |
          mkdir -p dist
          cp target/release/vbscript dist/
          cp -r www dist/ 2>/dev/null || mkdir -p dist/www
          cp .env.example dist/
          cp README.md dist/
          cp VERSION dist/
          cd dist
          tar czf "vbscript-linux-x64-v${{ steps.get_version.outputs.version }}.tar.gz" vbscript www .env.example README.md VERSION

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: vbscript-linux-x64
          path: dist/*.tar.gz

  # 构建 Linux musl 版本（静态链接）
  build-linux-musl:
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-unknown-linux-musl

      - name: Install musl tools
        run: sudo apt-get update && sudo apt-get install -y musl-tools

      - name: Cache cargo dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-musl-cargo-${{ hashFiles('**/Cargo.lock') }}

      - name: Build release (musl)
        run: cargo build --release --target x86_64-unknown-linux-musl --verbose

      - name: Get version
        id: get_version
        run: |
          VERSION=$(cat VERSION)
          echo "VERSION=$VERSION" >> $GITHUB_OUTPUT
          echo "version=$VERSION" >> $GITHUB_OUTPUT

      - name: Package binary
        run: |
          mkdir -p dist
          cp target/x86_64-unknown-linux-musl/release/vbscript dist/
          cp -r www dist/ 2>/dev/null || mkdir -p dist/www
          cp .env.example dist/
          cp README.md dist/
          cp VERSION dist/
          cd dist
          tar czf "vbscript-linux-musl-x64-v${{ steps.get_version.outputs.version }}.tar.gz" vbscript www .env.example README.md VERSION

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: vbscript-linux-musl-x64
          path: dist/*.tar.gz

  # 构建 macOS 版本
  build-macos:
    runs-on: macos-latest
    needs: test
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}

      - name: Build release
        run: cargo build --release --verbose

      - name: Get version
        id: get_version
        run: |
          VERSION=$(cat VERSION)
          echo "VERSION=$VERSION" >> $GITHUB_OUTPUT
          echo "version=$VERSION" >> $GITHUB_OUTPUT

      - name: Package binary
        run: |
          mkdir -p dist
          cp target/release/vbscript dist/
          cp -r www dist/ 2>/dev/null || mkdir -p dist/www
          cp .env.example dist/
          cp README.md dist/
          cp VERSION dist/
          cd dist
          tar czf "vbscript-macos-x64-v${{ steps.get_version.outputs.version }}.tar.gz" vbscript www .env.example README.md VERSION

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: vbscript-macos-x64
          path: dist/*.tar.gz

  # 创建 Release
  release:
    runs-on: ubuntu-latest
    needs: [build-linux, build-linux-musl, build-macos]
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Get version
        id: get_version
        run: |
          VERSION=$(cat VERSION)
          echo "VERSION=$VERSION" >> $GITHUB_OUTPUT

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          name: "vbscript v${{ steps.get_version.outputs.VERSION }}"
          files: |
            artifacts/vbscript-linux-x64/*.tar.gz
            artifacts/vbscript-linux-musl-x64/*.tar.gz
            artifacts/vbscript-macos-x64/*.tar.gz
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # 构建 Docker 镜像并推送到 Docker Hub
  docker:
    runs-on: ubuntu-latest
    needs: [build-linux-musl, release]
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4

      - name: Download musl artifact
        uses: actions/download-artifact@v4
        with:
          name: vbscript-linux-musl-x64
          path: artifacts

      - name: Extract binary
        run: tar xzf artifacts/*.tar.gz

      - name: Get version
        id: get_version
        run: |
          VERSION=$(cat VERSION)
          echo "VERSION=$VERSION" >> $GITHUB_OUTPUT

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile
          platforms: linux/amd64
          push: true
          tags: |
            jonahfu/vbscript:latest
            jonahfu/vbscript:${{ steps.get_version.outputs.VERSION }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Update Docker Hub README
        uses: peter-evans/dockerhub-description@v4
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
          repository: jonahfu/vbscript
          readme-filepath: ./dockerhub.md
